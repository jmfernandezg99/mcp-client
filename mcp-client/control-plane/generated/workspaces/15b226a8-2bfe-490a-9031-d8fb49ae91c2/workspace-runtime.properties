# Workspace runtime generated by control-plane
# Define tu propia API key antes de arrancar: $env:GEMINI_API_KEY="tu_clave"

quarkus.http.port=8091
quarkus.langchain4j.ai.gemini.api-key=${GEMINI_API_KEY:}
quarkus.langchain4j.ai.gemini.chat-model.model-id=${GEMINI_MODEL:gemini-2.5-flash}
quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true

# Generated from MCP servers

quarkus.langchain4j.mcp.weather.transport-type=streamable-http
quarkus.langchain4j.mcp.weather.url=http://localhost:8080/mcp/v1
quarkus.langchain4j.mcp.weather.log-requests=true
quarkus.langchain4j.mcp.weather.log-responses=true


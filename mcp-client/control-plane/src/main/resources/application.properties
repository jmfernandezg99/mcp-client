quarkus.http.port=8081

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:mcp_user}
quarkus.datasource.password=${DB_PASS:mcp_password}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/mcp_db}
quarkus.flyway.migrate-at-start=true

app.master.key=${APP_MASTER_KEY:0123456789abcdef0123456789abcdef}
app.ai.system-prompt=Eres un asistente que puede usar herramientas MCP para obtener datos externos. Usa las herramientas cuando necesites informacion del mundo real y responde en espanol de forma concisa.

quarkus.langchain4j.ai.gemini.api-key=${GEMINI_API_KEY:}
quarkus.langchain4j.ai.gemini.chat-model.model-id=${GEMINI_MODEL:gemini-2.5-flash}
quarkus.langchain4j.log-requests=false
quarkus.langchain4j.log-responses=false

quarkus.hibernate-orm.sql-load-script=no-file

smallrye.jwt.new-token.lifespan=86400

quarkus.http.host=0.0.0.0
quarkus.http.cors.enabled=true

%test.quarkus.http.test-port=0
%test.quarkus.http.port=0


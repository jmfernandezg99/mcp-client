<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Client</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e2e; color: #cdd6f4; margin: 0; padding: 2rem; }
        .container { max-width: 1000px; margin: 0 auto; background: #313244; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.5); }
        h1 { color: #89b4fa; text-align: center; margin-top: 0; }

        .top-panel { background: #181825; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #45475a;}
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #45475a; background: #11111b; color: white; font-size: 16px; outline: none; }
        button { padding: 12px 24px; background: #89b4fa; color: #11111b; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #b4befe; }

        .server-badges { display: flex; gap: 10px; flex-wrap: wrap; }
        .badge { background: #a6e3a1; color: #11111b; padding: 5px 12px; border-radius: 15px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px;}
        .badge.loading { background: #f9e2af; }

        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;}
        .tool-card { background: #181825; border: 1px solid #45475a; border-radius: 8px; padding: 20px; display: flex; flex-direction: column;}
        .tool-card .server-tag { font-size: 11px; background: #45475a; color: #cdd6f4; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 10px; word-break: break-all;}
        .tool-card h3 { margin: 0 0 10px 0; color: #f38ba8; font-size: 18px;}
        .tool-card p { font-size: 13px; color: #bac2de; margin-bottom: 15px; flex-grow: 1;}

        .tool-input-group { margin-bottom: 10px; }
        .tool-input-group label { display: block; font-size: 12px; color: #89b4fa; margin-bottom: 4px;}
        .tool-input-group input { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 4px; background: #313244; border: 1px solid #45475a; color: white;}

        .execute-btn { background: #a6e3a1; width: 100%; margin-top: 10px; padding: 10px; font-size: 14px;}
        .execute-btn:hover { background: #94e2d5; }

        .result-box { margin-top: 10px; background: #11111b; padding: 10px; border-radius: 4px; display: none; }
        .result-box pre { margin: 0; white-space: pre-wrap; font-size: 12px; color: #a6e3a1; word-wrap: break-word;}
    </style>
</head>
<body>

<div class="container">
    <h1>MCP Client</h1>

    <div class="top-panel">
        <div class="input-group">
            <input type="text" id="serverUrl" value="" placeholder="URL del Servidor MCP (ej. http://localhost:8080)">
            <button onclick="addServer()">Añadir Servidor</button>
        </div>
        <div id="activeServers" class="server-badges">
        </div>
    </div>

    <h2 style="font-size: 18px; color: #bac2de; border-bottom: 1px solid #45475a; padding-bottom: 10px;">Catálogo de Herramientas</h2>
    <div id="toolsContainer" class="tools-grid">
    </div>
</div>

<script>
    const connectedServers = new Set(); // Evita añadir el mismo servidor dos veces en UI

    async function addServer() {
        const urlInput = document.getElementById('serverUrl').value.trim();
        if (!urlInput) return;

        // Mostrar el servidor como "Cargando..."
        const badgeId = 'badge-' + btoa(urlInput).replace(/[^a-zA-Z0-9]/g, '');
        if (!document.getElementById(badgeId)) {
            document.getElementById('activeServers').innerHTML += `<div id="${badgeId}" class="badge loading">⏳ Conectando: ${urlInput}...</div>`;
        }

        try {
            const response = await fetch('/api/mcp/connect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });

            const data = await response.json();
            let parsedData = typeof data === 'string' ? JSON.parse(data) : data;

            if (parsedData.error) throw new Error(parsedData.error);

            // Si la conexión es exitosa, marcamos el servidor en verde
            document.getElementById(badgeId).className = "badge";
            document.getElementById(badgeId).innerHTML = `🟢 Conectado: ${urlInput}`;
            connectedServers.add(urlInput);

            if (parsedData.result && parsedData.result.tools) {
                renderTools(parsedData.result.tools, urlInput);
            }

            // Limpiamos el input para que puedas añadir otro
            document.getElementById('serverUrl').value = '';

        } catch (error) {
            document.getElementById(badgeId).className = "badge";
            document.getElementById(badgeId).style.background = "#f38ba8";
            document.getElementById(badgeId).innerHTML = `🔴 Error: ${urlInput}`;
            alert("Fallo al conectar a " + urlInput + ":\n" + error.message);
        }
    }

    function renderTools(tools, serverUrl) {
        const container = document.getElementById('toolsContainer');

        tools.forEach(tool => {
            const cardId = `tool-${serverUrl}-${tool.name}`.replace(/[^a-zA-Z0-9-]/g, '');
            // Si la herramienta ya existe en el panel, la borramos para redibujarla actualizada
            if(document.getElementById(cardId)) document.getElementById(cardId).remove();

            const card = document.createElement('div');
            card.className = 'tool-card';
            card.id = cardId;

            let inputsHtml = '';
            if (tool.inputSchema && tool.inputSchema.properties) {
                for (const [propName, propDetails] of Object.entries(tool.inputSchema.properties)) {
                    inputsHtml += `
                            <div class="tool-input-group">
                                <label>${propName} (${propDetails.type})</label>
                                <input type="text" data-arg-name="${propName}" placeholder="${propDetails.description || ''}">
                            </div>
                        `;
                }
            }

            card.innerHTML = `
                    <div class="server-tag">Servidor: ${serverUrl}</div>
                    <h3>⚙️ ${tool.name}</h3>
                    <p>${tool.description || 'Sin descripción disponible'}</p>
                    <div class="inputs-container">${inputsHtml}</div>
                    <button class="execute-btn" onclick="executeTool(this, '${tool.name}', '${serverUrl}')">Ejecutar</button>
                    <div class="result-box">
                        <pre></pre>
                    </div>
                `;
            container.appendChild(card);
        });
    }

    async function executeTool(btnElement, toolName, serverUrl) {
        const card = btnElement.closest('.tool-card');
        const resultBox = card.querySelector('.result-box');
        const preArea = card.querySelector('pre');

        const args = {};
        card.querySelectorAll('input[data-arg-name]').forEach(input => {
            if(input.value) args[input.dataset.argName] = input.value;
        });

        btnElement.textContent = "Ejecutando... ⏳";
        resultBox.style.display = "block";
        preArea.style.color = "#f9e2af";
        preArea.textContent = "Enviando por el túnel activo...";

        try {
            const response = await fetch('/api/mcp/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: serverUrl, toolName: toolName, arguments: args })
            });

            const data = await response.json();
            let parsedData = typeof data === 'string' ? JSON.parse(data) : data;

            if (parsedData.error) throw new Error(parsedData.error);

            preArea.style.color = "#a6e3a1";
            preArea.textContent = JSON.stringify(parsedData.result || parsedData, null, 2);
        } catch (error) {
            preArea.style.color = "#f38ba8";
            preArea.textContent = "Error: " + error.message;
        } finally {
            btnElement.textContent = "Ejecutar";
        }
    }
</script>
</body>
</html>

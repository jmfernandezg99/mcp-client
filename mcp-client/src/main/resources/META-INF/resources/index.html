<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudio - Nexus MCP</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #8b5cf6;
            --text: #f1f5f9; --user: #0ea5e9; --ai: #10b981; --tool: #f43f5e;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }

        /* Header */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; color: var(--accent); font-size: 2rem; }

        /* Paneles */
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        button { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; background: var(--accent); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Servidores */
        .server-list { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #334155; border: 1px solid #475569; }
        .badge.online { border-color: #10b981; color: #10b981; }

        /* Chat */
        #chat-window { height: 450px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 10px; margin-bottom: 20px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; }
        .msg.user { align-self: flex-end; background: var(--user); color: white; border-bottom-right-radius: 2px; }
        .msg.ai { align-self: flex-start; background: #334155; border-bottom-left-radius: 2px; }

        /* Tool Inspector */
        .tool-call {
            background: #1a1a1a; border-left: 3px solid var(--tool);
            padding: 12px; border-radius: 6px; font-family: 'Fira Code', monospace;
            font-size: 12px; margin: 10px 0; color: #e2e8f0;
        }
        .tool-header { color: var(--tool); font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 5px;}
        .json-block { color: #94a3b8; overflow-x: auto; white-space: pre-wrap; margin-top: 4px;}

        /* Scrollbar */
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Claudio</h1>
        <p style="color: #94a3b8">Quarkus Agente MCP</p>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="URL del Servidor MCP (ej. http://localhost:8080)">
            <button onclick="connectServer()">Conectar</button>
        </div>
        <div id="serverList" class="server-list"></div>
    </div>

    <div class="card" style="padding: 25px;">
        <div id="chat-window">
            <div class="msg ai">¡Hola! Conecta tus servidores MCP arriba y pregúntame lo que necesites. Soy capaz de encadenar herramientas automáticamente.</div>
        </div>
        <div class="input-group">
            <input type="text" id="chatInput" placeholder="Pregunta algo..." onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()" style="background: #10b981;">Enviar</button>
        </div>
    </div>
</div>

<script>
    const servers = new Set();

    async function connectServer() {
        const url = document.getElementById('urlInput').value.trim();
        if(!url) return;

        try {
            const res = await fetch('/api/mcp/connect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error);

            servers.add(url);
            renderServers();
            document.getElementById('urlInput').value = '';
        } catch(e) { alert("Error: " + e.message); }
    }

    function renderServers() {
        const container = document.getElementById('serverList');
        container.innerHTML = Array.from(servers).map(s => `<span class="badge online">● ${s}</span>`).join('');
    }

    async function sendChat() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if(!text || servers.size === 0) return;

        appendMessage('user', text);
        input.value = '';

        const loading = appendMessage('ai', 'Pensando y buscando datos...');

        try {
            const res = await fetch('/api/mcp/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await res.json();

            loading.remove();

            if(data.error) {
                appendMessage('ai', '❌ Error: ' + data.error);
                return;
            }

            // Renderizado inteligente
            let html = `<div>${data.reply}</div>`;

            // Verificamos si hay un array de herramientas ejecutadas
            if(data.toolInfo && Array.isArray(data.toolInfo) && data.toolInfo.length > 0) {
                data.toolInfo.forEach(tool => {
                    html += `
                        <div class="tool-call">
                            <div class="tool-header">🔧 TOOL_EXECUTION: ${tool.name}</div>
                            <div class="json-block"><b>Input:</b> ${JSON.stringify(tool.arguments)}</div>
                            <div class="json-block" style="color: #10b981"><b>Output:</b> ${JSON.stringify(tool.rawResult)}</div>
                        </div>
                    `;
                });
            }

            appendMessage('ai', html, true);

        } catch(e) {
            loading.remove();
            appendMessage('ai', 'Error de conexión.');
        }
    }

    function appendMessage(role, content, isHtml = false) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        if(isHtml) div.innerHTML = content;
        else div.textContent = content;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }
</script>
</body>
</html>

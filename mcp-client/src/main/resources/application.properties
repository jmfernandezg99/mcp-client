# Puerto de MCP CLient
quarkus.http.port=8081

# Configuración del motor de IA (Gemini)
gemini.api.key="apikey"

# --- NUEVA CONFIGURACIÓN: Base de Datos (PostgreSQL) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/mcp_db}
quarkus.datasource.username=${DB_USER:mcp_user}
quarkus.datasource.password=${DB_PASS:mcp_password}
quarkus.hibernate-orm.database.generation=none

# --- NUEVA CONFIGURACIÓN: Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# --- NUEVA CONFIGURACIÓN: Seguridad (JWT) ---
# Generar claves con openssl:
# openssl genrsa -out rsaPrivateKey.pem 2048
# openssl rsa -pubout -in rsaPrivateKey.pem -out publicKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=mcp-auth
smallrye.jwt.sign.key.location=rsaPrivateKey.pem
smallrye.jwt.new-token.issuer=mcp-auth
smallrye.jwt.new-token.lifespan=28800

# --- NUEVA CONFIGURACIÓN: Cifrado API Keys ---
# Esta variable debe inyectarse por entorno y tener exactamente 32 caracteres (AES-256)
app.master.key=${APP_MASTER_KEY:12345678901234567890123456789012}
# Puerto de MCP Client
quarkus.http.port=8081

# Configuración del motor Gemini
# El apiKey se gestiona por cada usuario en la base de datos local.
# No hardcodear gemini.api.key aquí.

# Base de Datos (PostgreSQL)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:mcp_user}
quarkus.datasource.password=${DB_PASS:mcp_password}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/mcp_db}

# Master Key para cifrado (AES-256 exige 32 caracteres)
app.master.key=${APP_MASTER_KEY:0123456789abcdef0123456789abcdef}

# Hibernate / Panache
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.sql-load-script=no-file

# Seguridad JWT
# Asegúrate de que los archivos .pem existen en src/main/resources
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=mcp-issuer
smallrye.jwt.sign.key.location=rsaPrivateKey.pem
smallrye.jwt.new-token.issuer=mcp-issuer
smallrye.jwt.new-token.lifespan=3600

# Quarkus HTTP host (Para permitir conexiones externas/Docker)
quarkus.http.host=0.0.0.0
quarkus.http.cors=true
